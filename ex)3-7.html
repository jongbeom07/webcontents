<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>데이터 목록을 가진 텍스트 입력</title>
    </head>
    <body>
        <h3>가보고 싶은 곳</h3>
        <hr>
        <form>
            니리: <input type="text" list="countries"><br>
            <detailist id="countries">
                <option value="가나">
                <option value="스위스">
                <option value="브라질">
            </detailist>

            보고싶은것:<input type="text" list="what"><br>
            <detailist id="what">
                <option value="산">
                <option value="바다">
                <option value="도시">
            </detailist>
        </form>
    </body>
</html>
