<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>도형서식 폼 만들기</title>
    </head>
    <body>
        <h3><b>도형 서식 폼 만들기</b></h3>
        <hr>
        <fieldset>도형 서식 입력
        <form>
            <select name="선종류" size="3">
             <option value="1">실선</option>   
             <option value="2">선없음</option>
             <option value="3">점선</option>
            </select><br><br>

            선두께:<input type="number" min="0.0" max="10.0" step="0.5"><br><br>
            선색:<input type="color" value="#00BFF"
                        onchange="document.body.style.color=this.value"><br><br>
            투명도:<input type="range" min="10" max="30"
                        list="shadow"><br><br>
        </form>
    </fieldset>
    </body>
</html>
